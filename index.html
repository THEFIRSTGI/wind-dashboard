<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wind Power Intelligence Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0e17;
      --surface:   #111827;
      --surface2:  #1a2235;
      --border:    #1e2d45;
      --border2:   #2a3f5e;
      --blue:      #3b82f6;
      --blue-dim:  #1d4ed8;
      --cyan:      #22d3ee;
      --green:     #34d399;
      --amber:     #fbbf24;
      --red:       #f87171;
      --text:      #e2e8f0;
      --text-muted:#6b8097;
      --text-dim:  #3d5166;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans KR', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    #app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 24px 28px 60px; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo-mark {
      width: 36px; height: 36px;
      border: 2px solid var(--blue);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-mark svg { width: 20px; height: 20px; }
    .site-title {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--text);
      text-transform: uppercase;
    }
    .site-sub { font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 20px; }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 11px; color: var(--green);
      letter-spacing: 0.08em;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    #last-updated { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .kpi-card:hover { border-color: var(--border2); }
    .kpi-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .kpi-card.blue::after  { background: var(--blue); }
    .kpi-card.cyan::after  { background: var(--cyan); }
    .kpi-card.green::after { background: var(--green); }
    .kpi-card.amber::after { background: var(--amber); }
    .kpi-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .kpi-value {
      font-family: var(--mono);
      font-size: 32px;
      font-weight: 600;
      line-height: 1;
      color: var(--text);
    }
    .kpi-value.blue  { color: var(--blue); }
    .kpi-value.cyan  { color: var(--cyan); }
    .kpi-value.green { color: var(--green); }
    .kpi-value.amber { color: var(--amber); }
    .kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .panel.full-width { grid-column: 1 / -1; }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .panel-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid;
    }
    .panel-badge.blue  { color: var(--blue);  border-color: var(--blue-dim);  background: rgba(59,130,246,0.08); }
    .panel-badge.green { color: var(--green); border-color: rgba(52,211,153,0.3); background: rgba(52,211,153,0.08); }
    .panel-body { padding: 20px; }

    #trend-wrapper { position: relative; width: 100%; height: 220px; }

    .tab-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      padding: 12px 20px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      text-transform: uppercase;
      transition: color 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .news-feed {
      max-height: 380px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
    }
    .news-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .news-item:hover { background: var(--surface2); }
    .news-item:last-child { border-bottom: none; }
    .news-date {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
      padding-top: 2px;
      min-width: 70px;
    }
    .news-title a {
      font-size: 13px;
      color: var(--text);
      text-decoration: none;
      line-height: 1.45;
      display: block;
    }
    .news-title a:hover { color: var(--blue); }
    .news-new {
      display: inline-block;
      font-family: var(--mono);
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(59,130,246,0.15);
      color: var(--blue);
      border: 1px solid rgba(59,130,246,0.3);
      margin-left: 6px;
      vertical-align: middle;
    }

    .report-body {
      max-height: 500px;
      overflow-y: auto;
      padding: 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
      font-size: 13.5px;
      line-height: 1.75;
      color: var(--text);
    }
    .report-body h2 {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cyan);
      margin: 20px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .report-body h2:first-child { margin-top: 0; }
    .report-body b, .report-body strong { color: var(--text); font-weight: 600; }
    .report-body ul { padding-left: 18px; }
    .report-body li { margin-bottom: 5px; color: var(--text-muted); }
    .report-body a { color: var(--blue); }

    .chart-legend {
      display: flex; gap: 16px;
      font-family: var(--mono); font-size: 11px; color: var(--text-muted);
      margin-bottom: 12px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    #loading-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 20px;
      z-index: 999;
    }
    .loading-text {
      font-family: var(--mono); font-size: 12px; letter-spacing: 0.2em;
      color: var(--text-muted); text-transform: uppercase;
    }
    .loading-bar-wrap {
      width: 200px; height: 2px;
      background: var(--surface2); border-radius: 2px; overflow: hidden;
    }
    .loading-bar {
      height: 100%; width: 0%; background: var(--blue);
      animation: load 1.8s ease-in-out infinite;
    }
    @keyframes load {
      0% { width: 0%; margin-left: 0%; }
      50% { width: 80%; margin-left: 10%; }
      100% { width: 0%; margin-left: 100%; }
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

<div id="loading-screen">
  <div style="display:flex;align-items:center;gap:10px;">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
    <span class="loading-text">Wind Power Intelligence</span>
  </div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  <span style="font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:0.15em;">
    LOADING DATA...
  </span>
</div>

<div id="app" style="display:none;">
  <header>
    <div class="header-left">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div>
        <div class="site-title">Wind Power Intelligence</div>
        <div class="site-sub">풍력 산업 동향 분석 대시보드</div>
      </div>
    </div>
    <div class="header-right">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <div id="last-updated">—</div>
    </div>
  </header>

  <div class="kpi-grid">
    <div class="kpi-card blue">
      <div class="kpi-label">총 수집 기사</div>
      <div class="kpi-value blue" id="kpi-total">—</div>
      <div class="kpi-sub">누적 전체</div>
    </div>
    <div class="kpi-card cyan">
      <div class="kpi-label">국내 뉴스</div>
      <div class="kpi-value cyan" id="kpi-domestic">—</div>
      <div class="kpi-sub">Google News KR</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-label">해외 뉴스</div>
      <div class="kpi-value green" id="kpi-global">—</div>
      <div class="kpi-sub">Google News US</div>
    </div>
    <div class="kpi-card amber">
      <div class="kpi-label">오늘 신규</div>
      <div class="kpi-value amber" id="kpi-today">—</div>
      <div class="kpi-sub" id="kpi-today-sub">국내 — / 해외 —</div>
    </div>
  </div>

  <div class="main-grid">

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">일별 수집 트렌드 (최근 30일)</span>
        <span class="panel-badge blue">TREND</span>
      </div>
      <div class="panel-body">
        <div class="chart-legend">
          <div class="legend-item">
            <div class="legend-dot" style="background:#3b82f6;"></div>국내
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background:#34d399;"></div>해외
          </div>
        </div>
        <div id="trend-wrapper">
          <canvas id="trendChart" role="img" aria-label="일별 국내외 풍력 뉴스 수집 건수 추이 차트">일별 수집 건수 추이 데이터</canvas>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('domestic', this)">국내 뉴스</button>
        <button class="tab-btn" onclick="switchTab('global', this)">해외 뉴스</button>
      </div>
      <div id="tab-domestic" class="tab-content active">
        <div class="news-feed" id="feed-domestic">
          <div class="empty-state">LOADING...</div>
        </div>
      </div>
      <div id="tab-global" class="tab-content">
        <div class="news-feed" id="feed-global">
          <div class="empty-state">LOADING...</div>
        </div>
      </div>
    </div>

    <div class="panel full-width">
      <div class="panel-header">
        <span class="panel-title">Gemini AI 분석 리포트 (최신)</span>
        <span class="panel-badge green">AI GENERATED</span>
      </div>
      <div class="report-body" id="ai-report">
        <div class="empty-state">LOADING...</div>
      </div>
    </div>

  </div>
</div>

<script>
  function switchTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    btn.classList.add('active');
  }

  function animateCount(el, target) {
    const dur = 800, start = performance.now();
    function step(now) {
      const p = Math.min((now - start) / dur, 1);
      el.textContent = Math.round(p * target).toLocaleString();
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function renderFeed(containerId, items, today) {
    const container = document.getElementById(containerId);
    if (!items || items.length === 0) {
      container.innerHTML = '<div class="empty-state">NO DATA</div>';
      return;
    }
    container.innerHTML = items.map(item => {
      const isNew = item.date === today;
      return `
        <div class="news-item">
          <div class="news-date">${item.date || '—'}</div>
          <div class="news-title">
            <a href="${item.link}" target="_blank" rel="noopener">
              ${item.title}${isNew ? '<span class="news-new">NEW</span>' : ''}
            </a>
          </div>
        </div>`;
    }).join('');
  }

  let trendChart = null;
  function renderTrendChart(trendData) {
    if (!trendData || trendData.length === 0) {
      document.getElementById('trend-wrapper').innerHTML =
        '<div class="empty-state" style="padding-top:70px;">집계 시트 데이터가 없습니다</div>';
      return;
    }
    if (trendChart) trendChart.destroy();
    trendChart = new Chart(document.getElementById('trendChart'), {
      type: 'line',
      data: {
        labels: trendData.map(d => d.date),
        datasets: [
          {
            label: '국내',
            data: trendData.map(d => d.domestic),
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59,130,246,0.08)',
            fill: true,
            tension: 0.35,
            pointRadius: 3,
            pointBackgroundColor: '#3b82f6',
            borderWidth: 2
          },
          {
            label: '해외',
            data: trendData.map(d => d.global),
            borderColor: '#34d399',
            backgroundColor: 'rgba(52,211,153,0.06)',
            fill: true,
            tension: 0.35,
            pointRadius: 3,
            pointBackgroundColor: '#34d399',
            borderWidth: 2,
            borderDash: [5, 3]
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#111827',
            borderColor: '#1e2d45',
            borderWidth: 1,
            titleColor: '#6b8097',
            bodyColor: '#e2e8f0',
            titleFont: { family: "'IBM Plex Mono', monospace", size: 10 },
            bodyFont: { family: "'IBM Plex Mono', monospace", size: 11 },
            padding: 10
          }
        },
        scales: {
          x: {
            ticks: {
              color: '#3d5166',
              font: { family: "'IBM Plex Mono', monospace", size: 9 },
              maxRotation: 45,
              autoSkip: true,
              maxTicksLimit: 10
            },
            grid: { color: '#1e2d45' }
          },
          y: {
            beginAtZero: true,
            ticks: {
              color: '#3d5166',
              font: { family: "'IBM Plex Mono', monospace", size: 9 },
              precision: 0
            },
            grid: { color: '#1e2d45' }
          }
        }
      }
    });
  }

  function onDataSuccess(jsonStr) {
    const data = typeof jsonStr === 'string' ? JSON.parse(jsonStr) : jsonStr;
    const today = data.lastUpdated || '';

    document.getElementById('last-updated').textContent = '업데이트: ' + today;

    animateCount(document.getElementById('kpi-total'),    data.kpi.total);
    animateCount(document.getElementById('kpi-domestic'), data.kpi.domestic);
    animateCount(document.getElementById('kpi-global'),   data.kpi.global);
    animateCount(document.getElementById('kpi-today'),    data.kpi.todayNew);
    document.getElementById('kpi-today-sub').textContent =
      '국내 ' + data.kpi.todayDomestic + ' / 해외 ' + data.kpi.todayGlobal;

    renderFeed('feed-domestic', data.domesticNews, today);
    renderFeed('feed-global',   data.globalNews,   today);
    renderTrendChart(data.trend);

    document.getElementById('ai-report').innerHTML =
      data.latestReport || '<div class="empty-state">리포트 없음</div>';

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }

  function onDataFailure(err) {
    document.getElementById('loading-screen').innerHTML =
      '<div class="loading-text" style="color:#f87171;">데이터 로드 실패<br>' +
      '<span style="font-size:10px;color:#3d5166;">' + (err || '') + '</span></div>';
  }

  /* ✅ GitHub Pages용 - data.json을 직접 fetch */
  fetch('./data.json?t=' + Date.now())
    .then(r => r.json())
    .then(data => onDataSuccess(data))
    .catch(err => onDataFailure(err.message));
</script>
</body>
</html>
